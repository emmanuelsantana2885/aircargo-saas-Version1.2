# ─── App ────────────────────────────────────────
spring.application.name=aircargo-api
server.port=9091

# ─── PostgreSQL ────────────────────────────────__
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:aircargo}?sslmode=disable
spring.datasource.username=${POSTGRES_USER:aircargo_user}
spring.datasource.password=${POSTGRES_PASSWORD:aircargo_pass_2024}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ─── JPA / Hibernate ─────────────────────────────
# Production-safe: validates that DB schema matches JPA entities (prevents accidental DDL changes)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ─── Flyway ──────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── Actuator ────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ─── JWT ─────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dev-only-insecure-secret-do-not-use-in-production-please-change-me}
app.jwt.expiration-ms=86400000

# ─── CORS ─────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}

# ─── File Upload ──────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
aircargo.upload.dir=${UPLOAD_DIR:./uploads}

# ─── Cache (Caffeine) ────────────────────────────
spring.cache.type=caffeine

# ─── Gzip Compression ────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/css,application/javascript
server.compression.min-response-size=1024

# ─── OpenAPI / Swagger ───────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.packages-to-scan=com.aircargo.controller
springdoc.default-produces-media-type=application/json


