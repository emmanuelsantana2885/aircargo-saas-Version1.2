spring.application.name=aircargo-gateway
server.port=8080

# ─── Routes ────────────────────────────────────────
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:9092
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**,/api/audit-logs/**,/api/sites/**,/api/role-permissions/**

spring.cloud.gateway.routes[1].id=flight-service
spring.cloud.gateway.routes[1].uri=http://localhost:9093
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/flights/**,/api/airlines/**,/api/aircraft-types/**

spring.cloud.gateway.routes[2].id=booking-service
spring.cloud.gateway.routes[2].uri=http://localhost:9094
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/bookings/**

spring.cloud.gateway.routes[3].id=mawb-service
spring.cloud.gateway.routes[3].uri=http://localhost:9095
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/mawbs/**,/api/cargo/mawbs/**,/api/cargo/hawbs/**,/api/tracking/**

spring.cloud.gateway.routes[4].id=warehouse-service
spring.cloud.gateway.routes[4].uri=http://localhost:9096
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/warehouse/**,/api/receipts/**,/api/hawbs/**

spring.cloud.gateway.routes[5].id=uld-service
spring.cloud.gateway.routes[5].uri=http://localhost:9097
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/ulds/**,/api/uld-awbs/**,/api/uld-type-config/**

spring.cloud.gateway.routes[6].id=load-planning-service
spring.cloud.gateway.routes[6].uri=http://localhost:9098
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/load-planning/**,/api/ramp-manifest/**

spring.cloud.gateway.routes[7].id=export-service
spring.cloud.gateway.routes[7].uri=http://localhost:9099
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/exports/**,/api/bi/**

spring.cloud.gateway.routes[8].id=api-service
spring.cloud.gateway.routes[8].uri=http://localhost:9091
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/**

# ─── CORS ────────────────────────────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173,http://localhost:5174
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# ─── Actuator ────────────────────────────────────
management.endpoints.web.exposure.include=health,info,gateway
