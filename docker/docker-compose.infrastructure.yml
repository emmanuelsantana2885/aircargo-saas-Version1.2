version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aircargo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aircargo_db
      POSTGRES_USER: aircargo_user
      POSTGRES_PASSWORD: aircargo_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aircargo_user -d aircargo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: aircargo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: aircargo
      RABBITMQ_DEFAULT_PASS: aircargo_pass_2024
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
