services:

  postgres:
    image: postgres:16-alpine
    container_name: aircargo-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB:       aircargo-db
      POSTGRES_USER:     aircargo_user
      POSTGRES_PASSWORD: aircargo_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: aircargo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: aircargo
      RABBITMQ_DEFAULT_PASS: aircargo_pass_2024
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/aircargo-api
      dockerfile: Dockerfile
    container_name: aircargo-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT:     5432
      POSTGRES_HOST:     postgres
    ports:
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
    command: java -jar app.jar

volumes:
  pgdata:
    driver: local
