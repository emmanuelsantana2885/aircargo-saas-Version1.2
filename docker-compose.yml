services:

  postgres:
    image: postgres:16-alpine
    container_name: aircargo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-aircargo}
      POSTGRES_USER:     ${POSTGRES_USER:-aircargo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aircargo_user} -d ${POSTGRES_DB:-aircargo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: aircargo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-aircargo}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-aircargo_pass_2024}
    ports:
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: aircargo-api/Dockerfile
    container_name: aircargo-api
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-aircargo}
      POSTGRES_USER:     ${POSTGRES_USER:-aircargo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      JWT_SECRET:        ${JWT_SECRET:?Set JWT_SECRET in .env}
      RABBITMQ_HOST:     rabbitmq
      RABBITMQ_PORT:     5672
      RABBITMQ_USER:     ${RABBITMQ_USER:-aircargo}
      RABBITMQ_PASS:     ${RABBITMQ_PASS:-aircargo_pass_2024}
      CORS_ORIGINS:      ${CORS_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "${BACKEND_PORT:-9091}:9091"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aircargo-web
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
