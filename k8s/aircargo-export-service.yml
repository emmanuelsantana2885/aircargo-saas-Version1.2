apiVersion: apps/v1
kind: Deployment
metadata:
  name: aircargo-export-service
  namespace: aircargo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aircargo-export-service
  template:
    metadata:
      labels:
        app: aircargo-export-service
    spec:
      containers:
        - name: aircargo-export-service
          image: aircargo/aircargo-export-service:latest
          ports:
            - containerPort: 9099
          envFrom:
            - configMapRef:
                name: aircargo-config
            - secretRef:
                name: aircargo-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9099
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9099
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: aircargo-export-service
  namespace: aircargo
spec:
  selector:
    app: aircargo-export-service
  ports:
    - port: 9099
      targetPort: 9099
